<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />

	<title>Fresh Fruit Basket</title>

	<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
	<header class="site-header">
		<div class="container header-inner">
			<a href="/" class="brand">
				<img src="{{ url_for('static', filename='images/fruit-box.svg') }}" alt="Fresh Fruit Basket" class="logo">
				<div>
					<h1>Fresh Fruit Basket</h1>
					<p class="tagline">Healthy fruits at affordable prices</p>
				</div>
			</a>
			<nav class="main-nav">
				<a href="/">Home</a>
				<a href="/fruits">Fruits</a>
				<a href="/order">Order</a>
				<a href="/contact">Contact</a>
			</nav>
		</div>
	</header>

	<main>
		<!-- page content -->
		{% block content %}{% endblock %}
	</main>

	<footer class="site-footer">
		<div class="container">
			<p>© 2026 Fresh Fruit Basket | Healthy Life</p>
			<p class="small">Phone: +91-98765-43210 • Email: hello@freshfruit.local</p>
		</div>
	</footer>

	<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
